name: Publish to pypi
env:
  VERSION: ${{ github.event.release.tag_name || github.ref_name }}
on:
  workflow_dispatch:
  release:
    types: [published]
permissions:
  contents: read
jobs:
  local-install-test:
    name: Build PeekingDuck and prepare environment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - name: Update Version Number
        run: |
          bash ./scripts/update_version.sh $VERSION
      - name: Verify Environment Setup
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r cicd_requirements.txt
          pip install .

  build-publish-test:
    name: Build PeekingDuck on Test PyPI
    needs: local-install-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - name: Update Version Number
        run: |
          bash ./scripts/update_version.sh $VERSION
      - name: Install pypa and build
        run: |
          echo "Building new version..."
          python -m pip install --upgrade pip
          python -m pip install build --user
          python -m build --sdist --wheel --outdir dist/ .
      - name: Publish distribution 📦 to Test PyPI
        uses: pypa/gh-action-pypi-publish@1.13.0
        with:
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          repository_url: https://test.pypi.org/legacy/
      - name: Publish distribution 📦 to PyPI
        if: startsWith(github.ref, 'refs/tags')
        uses: pypa/gh-action-pypi-publish@1.13.0
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
